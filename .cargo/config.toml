# Frame pointers are required for the GC frame walker to traverse
# the call stack and find GC roots. Without this, aarch64 Darwin
# may omit frame pointers for leaf functions, breaking the FP chain.
[build]
rustflags = ["-C", "force-frame-pointers=yes"]

[alias]
# Fast iteration: unit (--lib) tests only across the workspace. Skips the SLOW
# integration suites in tests/ dirs (extract-dependent runtime tests that spawn
# GHC, the real-core corpus, proptests, differentials). Use this while iterating;
# run the full `cargo test --workspace` only before merging a branch.
tq = "test --workspace --lib"
