name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-extract:
    name: Build tidepool-extract (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: tidepool
          skipPush: true
        continue-on-error: true

      - name: Build tidepool-extract
        run: nix build .#tidepool-extract

      - name: Create distributable archive
        run: |
          # Export the nix closure as a self-contained archive
          STORE_PATH=$(nix build .#tidepool-extract --print-out-paths)
          nix-store --export $(nix-store -qR "$STORE_PATH") > tidepool-extract-closure.nar

          # Also create a simple wrapper script for nix users
          cat > install.sh << 'INSTALL_EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          echo "Installing tidepool-extract via nix..."
          nix profile install "github:tidepool-heavy-industries/tidepool/$TAG#tidepool-extract"
          echo "Done. tidepool-extract is now on your PATH."
          INSTALL_EOF
          sed -i "s|\$TAG|${GITHUB_REF_NAME}|g" install.sh
          chmod +x install.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tidepool-extract-${{ matrix.system }}
          path: |
            tidepool-extract-closure.nar
            install.sh

  release:
    name: Create GitHub Release
    needs: build-extract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/tidepool-extract-x86_64-linux/*

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/tidepool-heavy-industries/tidepool
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
