name: CI
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: build tidepool-extract
        run: |
          EXTRACT_BIN=$(.github/ci-build-extract.sh)
          echo "$EXTRACT_BIN" >> "$GITHUB_PATH"

      - name: cargo test
        run: nix develop --command cargo test --workspace

      - name: cargo clippy
        run: nix develop --command cargo clippy --workspace -- -D warnings
