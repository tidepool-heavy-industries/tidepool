name: CI
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: cargo test
        run: nix develop --extra-experimental-features 'nix-command flakes' --command cargo test --workspace
      - name: cargo clippy
        run: nix develop --extra-experimental-features 'nix-command flakes' --command cargo clippy --workspace -- -D warnings
